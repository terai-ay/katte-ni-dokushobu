<!DOCTYPE html>
<html lang="ja">
<head>
<meta name="robots" content="noindex, nofollow">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>勝手に読書部</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #F5F0E8;
  --dark: #1C1A17;
  --ink: #2C2820;
  --muted: #7A7268;
  --accent: #B5322A;
  --accent-light: #E8C4C0;
  --border: #D8D0C4;
  --card-bg: #FDFAF5;
  --serif: 'Noto Serif JP', serif;
  --sans: 'Noto Sans JP', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--sans);
  background: var(--cream);
  color: var(--ink);
  min-height: 100vh;
}

/* ─── HEADER ─── */
header {
  background: var(--card-bg);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 32px; height: 64px;
}
.logo {
  display: flex; align-items: center; gap: 12px; cursor: pointer;
  text-decoration: none; color: inherit;
}
.logo img { height: 40px; width: 40px; object-fit: contain; }
.logo-img-fallback {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--dark); display: flex; align-items: center; justify-content: center;
  font-family: var(--serif); font-size: 13px; font-weight: 700; color: #C8A84B;
  letter-spacing: -0.5px;
}
.logo-text { font-family: var(--serif); font-size: 16px; font-weight: 700; color: var(--ink); line-height: 1.2; }
.logo-sub { font-size: 11px; color: var(--muted); font-family: var(--sans); }
nav { display: flex; align-items: center; gap: 4px; }
nav button {
  background: none; border: none; cursor: pointer;
  font-family: var(--sans); font-size: 13px; color: var(--muted);
  padding: 8px 14px; border-radius: 6px; transition: all .2s;
}
nav button:hover { background: var(--cream); color: var(--ink); }
nav button.active { color: var(--accent); font-weight: 500; }
.btn-post {
  background: var(--accent) !important; color: white !important;
  border-radius: 6px !important; padding: 8px 16px !important;
  font-weight: 500 !important; transition: opacity .2s !important;
}
.btn-post:hover { opacity: .85 !important; }

/* ─── PAGES ─── */
.page { display: none; }
.page.active { display: block; }

/* ─── HERO SLIDER ─── */
.hero {
  position: relative; overflow: hidden;
  height: 380px; background: var(--dark);
}
.hero-slides { display: flex; transition: transform .6s ease; height: 100%; }
.hero-slide {
  min-width: 100%; height: 100%; position: relative;
  display: flex; align-items: flex-end;
}
.hero-slide img {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: cover; opacity: .7;
}
.hero-slide-fallback {
  position: absolute; inset: 0;
  background: linear-gradient(135deg, #2C2820 0%, #4A3F35 50%, #1C1A17 100%);
  display: flex; align-items: center; justify-content: center;
}
.hero-slide-fallback-text {
  font-family: var(--serif); font-size: 64px; color: rgba(255,255,255,.05);
  letter-spacing: 8px; user-select: none;
}
.hero-caption {
  position: relative; z-index: 2;
  padding: 24px 48px 32px;
  background: linear-gradient(transparent, rgba(28,26,23,.8));
  width: 100%;
}
.hero-caption h2 {
  font-family: var(--serif); font-size: 26px; color: white;
  font-weight: 700; margin-bottom: 6px;
}
.hero-caption p { font-size: 13px; color: rgba(255,255,255,.7); }
.hero-dots {
  position: absolute; bottom: 12px; right: 24px; z-index: 3;
  display: flex; gap: 6px;
}
.hero-dot {
  width: 6px; height: 6px; border-radius: 3px;
  background: rgba(255,255,255,.4); border: none; cursor: pointer;
  transition: all .3s; padding: 0;
}
.hero-dot.active { width: 20px; background: white; }
.hero-prev, .hero-next {
  position: absolute; top: 50%; transform: translateY(-50%);
  z-index: 3; background: rgba(255,255,255,.15); border: none;
  color: white; width: 40px; height: 40px; border-radius: 50%;
  cursor: pointer; font-size: 18px; transition: background .2s;
  backdrop-filter: blur(4px);
}
.hero-prev:hover, .hero-next:hover { background: rgba(255,255,255,.3); }
.hero-prev { left: 16px; }
.hero-next { right: 16px; }

/* ─── SECTION ─── */
.section { padding: 48px 32px; max-width: 1100px; margin: 0 auto; }
.section-header {
  display: flex; align-items: baseline; gap: 12px; margin-bottom: 28px;
}
.section-title {
  font-family: var(--serif); font-size: 20px; font-weight: 700;
  position: relative; padding-left: 16px;
}
.section-title::before {
  content: ''; position: absolute; left: 0; top: 4px; bottom: 4px;
  width: 3px; background: var(--accent); border-radius: 2px;
}
.section-sub { font-size: 13px; color: var(--muted); }

/* ─── STORE CARDS ─── */
.store-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}
.store-card {
  background: var(--card-bg); border: 1px solid var(--border);
  border-radius: 10px; overflow: hidden; cursor: pointer;
  transition: transform .2s, box-shadow .2s;
}
.store-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(44,40,32,.1); }
.store-card-img {
  width: 100%; height: 160px; object-fit: cover;
  background: var(--cream);
  display: block;
}
.store-card-img-fallback {
  width: 100%; height: 160px;
  background: linear-gradient(135deg, var(--border) 0%, var(--cream) 100%);
  display: flex; align-items: center; justify-content: center;
}
.store-card-img-fallback span { font-size: 40px; opacity: .4; }
.store-card-body { padding: 16px; }
.store-card-name {
  font-family: var(--serif); font-size: 15px; font-weight: 700;
  margin-bottom: 6px; color: var(--ink);
}
.store-card-name--book-book { color: #5C4A32; }
.store-card-name--inspire  { color: #2E4D5C; }
.store-card-name--comimate { color: #5C2E4A; }
.store-card-name--bungaku  { color: #3D2E5C; }
.store-card-name--hoshi    { color: #2E3A5C; }
.store-card-name--yami     { color: #3A3A38; }
.store-card-desc { font-size: 12px; color: var(--muted); margin-bottom: 12px; line-height: 1.7; }
.store-card-count { font-size: 11px; color: var(--muted); margin-bottom: 10px; }
.btn-enter {
  font-size: 12px; color: var(--accent); font-weight: 500;
  display: flex; align-items: center; gap: 4px;
}
.btn-enter::after { content: '→'; }

/* ─── NEWS ─── */
.news-list { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.news-item {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 14px 20px; border-bottom: 1px solid var(--border);
  animation: fadeIn .4s ease;
}
.news-item:last-child { border-bottom: none; }
.news-badge {
  font-size: 10px; font-weight: 500; white-space: nowrap;
  padding: 3px 8px; border-radius: 4px;
  background: var(--accent-light); color: var(--accent);
  margin-top: 1px; flex-shrink: 0;
  min-width: 10em; text-align: center;
}
.news-badge--book-book { background: #EDE8DF; color: #5C4A32; }
.news-badge--inspire   { background: #DDE4E8; color: #2E4D5C; }
.news-badge--comimate  { background: #E8DDE4; color: #5C2E4A; }
.news-badge--bungaku   { background: #E2DDE8; color: #3D2E5C; }
.news-badge--hoshi     { background: #DDE1E8; color: #2E3A5C; }
.news-badge--yami      { background: #E0E0DF; color: #3A3A38; }
.news-text { font-size: 13px; line-height: 1.6; color: var(--ink); }
.news-time { font-size: 11px; color: var(--muted); margin-top: 2px; }
.news-empty { padding: 32px; text-align: center; color: var(--muted); font-size: 13px; }

/* ─── STORE DETAIL ─── */
.store-detail-header {
  background: var(--dark); color: white;
  padding: 32px; position: relative; overflow: hidden;
}
.store-detail-header-img {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: cover; opacity: .25;
}
.store-detail-header-inner { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; }
.store-detail-icon { font-size: 36px; margin-bottom: 8px; }
.store-detail-name {
  font-family: var(--serif); font-size: 28px; font-weight: 700; margin-bottom: 8px;
}
.store-detail-desc { font-size: 14px; opacity: .75; }
.back-btn {
  background: none; border: 1px solid var(--border); cursor: pointer;
  font-family: var(--sans); font-size: 13px; color: var(--muted);
  padding: 8px 16px; border-radius: 6px; transition: all .2s;
  display: flex; align-items: center; gap: 6px; margin-bottom: 24px;
}
.back-btn:hover { border-color: var(--ink); color: var(--ink); }

/* ─── BOOK CARDS ─── */
.book-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-bottom: 40px; grid-auto-rows: 1fr; }
.book-card {
  background: var(--card-bg); border: 1px solid var(--border);
  border-radius: 10px; padding: 16px; display: flex; gap: 14px;
  animation: fadeIn .4s ease; align-items: stretch; height: 100%;
}
.book-thumb {
  width: 60px; height: 80px; object-fit: cover; border-radius: 4px;
  background: var(--border); flex-shrink: 0; border: 1px solid var(--border);
}
.book-thumb-fallback {
  width: 60px; height: 80px; border-radius: 4px;
  background: var(--border); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; opacity: .4;
}
.book-info { flex: 1; min-width: 0; display: flex; flex-direction: column; }
.book-title { font-family: var(--serif); font-size: 14px; font-weight: 700; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.book-author { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
.book-point { font-size: 12px; color: var(--ink); line-height: 1.7; margin-bottom: 8px; }
.book-meta { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
.book-by { font-size: 11px; color: var(--muted); }
.book-link { font-size: 11px; color: var(--accent); text-decoration: none; }
.book-link:hover { text-decoration: underline; }
.book-empty { padding: 48px 32px; text-align: center; color: var(--muted); font-size: 14px; }

/* ─── FORM ─── */
.form-section {
  background: var(--card-bg); border: 1px solid var(--border);
  border-radius: 10px; padding: 28px 32px;
}
.form-section h3 {
  font-family: var(--serif); font-size: 17px; font-weight: 700;
  margin-bottom: 20px; padding-bottom: 14px; border-bottom: 1px solid var(--border);
}
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group.full { grid-column: 1 / -1; }
.form-group label { font-size: 12px; color: var(--muted); font-weight: 500; }
.form-group input, .form-group textarea, .form-group select {
  font-family: var(--sans); font-size: 13px; color: var(--ink);
  background: var(--cream); border: 1px solid var(--border);
  border-radius: 6px; padding: 9px 12px; transition: border-color .2s; outline: none;
}
.form-group input:focus, .form-group textarea:focus, .form-group select:focus {
  border-color: var(--accent);
}
.form-group textarea { resize: vertical; min-height: 80px; line-height: 1.7; }
.form-submit {
  margin-top: 20px; width: 100%; padding: 12px;
  background: var(--accent); color: white; border: none;
  border-radius: 8px; font-family: var(--sans); font-size: 14px; font-weight: 500;
  cursor: pointer; transition: opacity .2s;
}
.form-submit:hover { opacity: .85; }
.form-note { font-size: 12px; color: var(--muted); margin-top: 10px; text-align: center; }

/* ─── TOAST ─── */
.toast {
  position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(80px);
  background: var(--dark); color: white; padding: 12px 24px;
  border-radius: 8px; font-size: 13px; z-index: 999;
  transition: transform .3s ease; pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ─── ANIMATIONS ─── */
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* ─── RESPONSIVE ─── */
@media (max-width: 768px) {
  .store-grid { grid-template-columns: repeat(2, 1fr); }
  .form-grid { grid-template-columns: 1fr; }
  header { padding: 0 16px; }
  .hero-caption { padding: 16px 20px 24px; }
  .section { padding: 32px 16px; }
}
@media (max-width: 480px) {
  .store-grid { grid-template-columns: 1fr; }
}
/* ─── 削除ボタン・パスワード入力 ─── */
.delete-row { display: flex; gap: 6px; margin-top: 8px; align-items: center; }
.delete-pw-input {
  font-family: var(--sans); font-size: 12px; color: var(--ink);
  background: var(--cream); border: 1px solid var(--border);
  border-radius: 6px; padding: 5px 10px; outline: none;
  transition: border-color .2s; width: 140px;
}
.delete-pw-input:focus { border-color: var(--accent); }
.btn-delete-confirm {
  font-size: 11px; color: white; background: var(--accent);
  border: none; border-radius: 4px; padding: 4px 10px;
  cursor: pointer; font-family: var(--sans); transition: opacity .2s; white-space: nowrap;
}
.btn-delete-confirm:hover { opacity: .8; }
.yomitai-actions { display: flex; align-items: center; gap: 8px; }
 .furubon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; } .furubon-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 16px; position: relative; animation: fadeIn .4s ease; } .furubon-tags { display: flex; gap: 6px; margin-bottom: 10px; } .tag-give { background: #FAEEDA; color: #633806; font-size: 11px; padding: 3px 9px; border-radius: 4px; font-weight: 500; } .tag-lend { background: #E1F5EE; color: #085041; font-size: 11px; padding: 3px 9px; border-radius: 4px; font-weight: 500; } .furubon-title { font-family: var(--serif); font-size: 14px; font-weight: 700; margin-bottom: 3px; } .furubon-author { font-size: 12px; color: var(--muted); margin-bottom: 8px; } .furubon-comment { font-size: 12px; color: var(--ink); line-height: 1.7; margin-bottom: 10px; } .furubon-footer { display: flex; justify-content: space-between; align-items: center; } .furubon-by { font-size: 11px; color: var(--muted); } .furubon-done { font-size: 11px; color: var(--accent); border: 1px solid var(--accent-light); background: none; border-radius: 4px; padding: 3px 10px; cursor: pointer; font-family: var(--sans); transition: all .2s; } .furubon-done:hover { background: var(--accent); color: white; } .furubon-add-card { background: var(--card-bg); border: 1px dashed var(--border); border-radius: 10px; padding: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; cursor: pointer; min-height: 160px; transition: border-color .2s; } .furubon-add-card:hover { border-color: var(--accent); } .furubon-add-icon { font-size: 28px; color: var(--border); } .furubon-add-label { font-size: 13px; color: var(--muted); } .furubon-form { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 20px 24px; margin-top: 16px; display: none; } .furubon-form.open { display: block; animation: fadeIn .3s ease; } .furubon-form h4 { font-family: var(--serif); font-size: 15px; font-weight: 700; margin-bottom: 16px; }
/* ─── 読みたいリスト ─── */ .yomitai-list { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; } .yomitai-item { display: flex; align-items: center; gap: 12px; padding: 13px 20px; border-bottom: 1px solid var(--border); animation: fadeIn .4s ease; } .yomitai-item:last-child { border-bottom: none; } .yomitai-num { font-size: 12px; color: var(--muted); min-width: 20px; text-align: center; font-family: var(--serif); } .yomitai-info { flex: 1; } .yomitai-title { font-size: 13px; font-weight: 500; color: var(--ink); margin-bottom: 2px; } .yomitai-author { font-size: 11px; color: var(--muted); } .yomitai-by { font-size: 11px; color: var(--muted); white-space: nowrap; } .yomitai-good-btn { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--muted); background: none; border: 1px solid var(--border); border-radius: 20px; padding: 4px 10px; cursor: pointer; font-family: var(--sans); transition: all .2s; white-space: nowrap; } .yomitai-good-btn:hover { border-color: #378ADD; color: #185FA5; } .yomitai-good-btn.liked { border-color: #378ADD; color: #185FA5; background: #E6F1FB; } .yomitai-add-row { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; } .yomitai-input { font-family: var(--sans); font-size: 13px; color: var(--ink); background: var(--cream); border: 1px solid var(--border); border-radius: 6px; padding: 9px 12px; outline: none; transition: border-color .2s; } .yomitai-input:focus { border-color: #378ADD; } .yomitai-submit { padding: 9px 18px; background: #378ADD; color: white; border: none; border-radius: 6px; font-family: var(--sans); font-size: 13px; font-weight: 500; cursor: pointer; transition: opacity .2s; white-space: nowrap; } .yomitai-submit:hover { opacity: .85; } .yomitai-empty { padding: 32px; text-align: center; color: var(--muted); font-size: 13px; } 
/* ─── モーダル共通 ─── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(28,26,23,.55); z-index: 200;
  align-items: center; justify-content: center;
  padding: 16px;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: var(--card-bg); border-radius: 14px;
  width: 100%; max-width: 560px; max-height: 88vh;
  display: flex; flex-direction: column;
  border: 1px solid var(--border); overflow: hidden;
}
.modal-header {
  padding: 18px 20px 14px; border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: flex-start; flex-shrink: 0;
}
.modal-close {
  background: none; border: none; cursor: pointer;
  font-size: 20px; color: var(--muted); line-height: 1; padding: 0;
}
.modal-close:hover { color: var(--ink); }
.modal-body { flex: 1; overflow-y: auto; padding: 16px 20px; }

/* ─── 古本屋チャット ─── */
.chat-book-info {
  background: var(--cream); border-radius: 8px;
  padding: 12px 14px; margin-bottom: 14px;
  display: flex; gap: 12px; align-items: flex-start;
}
.chat-book-img {
  width: 48px; height: 64px; object-fit: cover;
  border-radius: 4px; border: 1px solid var(--border); flex-shrink: 0;
}
.chat-book-img-fallback {
  width: 48px; height: 64px; border-radius: 4px;
  background: var(--border); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 20px;
}
.chat-messages { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; min-height: 80px; }
.chat-msg-item { display: flex; flex-direction: column; gap: 2px; }
.chat-msg-name { font-size: 11px; color: var(--muted); }
.chat-msg-bubble {
  background: var(--card-bg); border: 1px solid var(--border);
  border-radius: 0 8px 8px 8px; padding: 8px 12px;
  font-size: 13px; line-height: 1.7; color: var(--ink);
  max-width: 90%; align-self: flex-start;
}
.chat-msg-time { font-size: 10px; color: var(--muted); }
.chat-input-row { display: flex; gap: 8px; border-top: 1px solid var(--border); padding-top: 14px; flex-shrink: 0; }
.chat-name-input { width: 100px; flex-shrink: 0; }
.chat-msg-input { flex: 1; }
.chat-send {
  background: var(--accent); color: white; border: none;
  border-radius: 6px; padding: 0 16px; font-family: var(--sans);
  font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap;
  transition: opacity .2s;
}
.chat-send:hover { opacity: .85; }
.chat-empty { font-size: 13px; color: var(--muted); text-align: center; padding: 20px 0; }

/* ─── 投稿文スクロール表示 ─── */
.book-point,
.furubon-comment {
  max-height: 6.2em;
  overflow-y: auto;
  padding-right: 6px;
  word-break: break-word;
}

.book-point::-webkit-scrollbar,
.furubon-comment::-webkit-scrollbar {
  width: 6px;
}

.book-point::-webkit-scrollbar-thumb,
.furubon-comment::-webkit-scrollbar-thumb {
  background: #c9c1b5;
  border-radius: 999px;
}

/* ─── 画像添付 ─── */
.img-upload-label {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--muted); cursor: pointer;
  border: 1px dashed var(--border); border-radius: 6px;
  padding: 8px 14px; transition: border-color .2s;
}
.img-upload-label:hover { border-color: var(--accent); color: var(--accent); }
.img-preview-thumb {
  width: 60px; height: 80px; object-fit: cover;
  border-radius: 4px; border: 1px solid var(--border); margin-top: 8px;
}

/* ─── poyo ─── */
.poyo-wrap {
  position: fixed; bottom: 24px; left: 36px; z-index: 150;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
}
.poyo-balloon-wrap {
  background: var(--card-bg); border: 1px solid var(--border);
  border-radius: 12px 12px 0 12px; padding: 10px 14px;

<script>
// ─── DATA ───────────────────────────────────────────
const STORES = [
  { id:'book-book',  name:'ブックセンター',  desc:'ジャンルを問わずなんでも揃う、読書部の総合書店。', icon:'📚', img:'images/store-book.png' },
  { id:'inspire',   name:'インスパイアブックス', desc:'専門書・ビジネス書・学術書が集まる知識の殿堂。', icon:'🔬', img:'images/store-inspire.png' },
  { id:'comimate',  name:'コミメイト',         desc:'マンガ専門店。名作から新作まで棚がにぎわう。',     icon:'🎨', img:'images/store-comimate.png' },
  { id:'bungaku',   name:'文学のともしび',     desc:'純文学・詩集・古典文学の灯台のような書店。',       icon:'🕯️', img:'images/store-bungaku.png' },
  { id:'hoshi',     name:'星空書房　火星店',   desc:'SF・宇宙・未来を語る本が宇宙の彼方から届く。',     icon:'🚀', img:'images/store-hoshi.png' },
  { id:'yami',      name:'闇夜の推理堂',       desc:'ミステリー・サスペンス・犯罪小説の専門店。',       icon:'🔍', img:'images/store-yami.png' },
];

const HERO_SLIDES = [
  { img:'images/hero1.jpg', title:'本は、もうひとつの世界への扉', sub:'読書部メンバーが選んだ一冊と出会おう' },
  { img:'images/hero2.jpg', title:'だれかのおすすめが、あなたの人生を変えるかも', sub:'架空の書店を、あなたの投稿で育てよう' },
  { img:'images/hero3.jpg', title:'ふらっと立ち寄る感覚で', sub:'好きな書店をのぞいてみてください' },
  { img:'images/hero4.jpg', title:'勝手に読書部、2周年', sub:'メンバーを募集中' },
];

// ─── SUPABASE ────────────────────────────────────────
const SUPA_URL = 'https://knqidnqfprljflpgjjck.supabase.co';
const SUPA_KEY = 'sb_publishable_rNFnJ59OPtc7kWVgQl9JGw_TIwwvcIF';
const SUPA_HEADERS = {
  'Content-Type': 'application/json',
  'apikey': SUPA_KEY,
  'Authorization': 'Bearer ' + SUPA_KEY,
};

async function sbFetch(path, options = {}) {
  const res = await fetch(SUPA_URL + '/rest/v1/' + path, {
    headers: SUPA_HEADERS, ...options
  });
  if (!res.ok) { const e = await res.text(); console.error('Supabase error:', e); return null; }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

// ─── books ───────────────────────────────────────────
async function getBooks() {
  const data = await sbFetch('books?select=*&order=created_at.asc');
  return (data || []).map(b => ({
    id: String(b.id), storeId: b.store_id, title: b.title,
    author: b.author, publisher: b.publisher, poster: b.poster,
    point: b.point, url: b.url, password: b.password,
    image: b.image, createdAt: b.created_at,
  }));
}
async function addBook(book) {
  await sbFetch('books', {
    method: 'POST',
    headers: { ...SUPA_HEADERS, 'Prefer': 'return=minimal' },
    body: JSON.stringify({
      store_id: book.storeId, title: book.title, author: book.author,
      publisher: book.publisher, poster: book.poster, point: book.point,
      url: book.url, password: book.password, image: book.image,
    }),
  });
}
async function deleteBookById(id) {
  await sbFetch('books?id=eq.' + id, { method: 'DELETE' });
}

// ─── yomitai ─────────────────────────────────────────
async function getYomitai() {
  const data = await sbFetch('yomitai?select=*&order=likes.desc,created_at.asc');
  return (data || []).map(y => ({
    id: String(y.id), title: y.title, author: y.author,
    poster: y.poster, likes: y.likes || 0,
    createdAt: y.created_at,
  }));
}
async function addYomitai(item) {
  await sbFetch('yomitai', {
    method: 'POST',
    headers: { ...SUPA_HEADERS, 'Prefer': 'return=minimal' },
    body: JSON.stringify({
      title: item.title, author: item.author, poster: item.poster,
      likes: 0,
    }),
  });
}
async function deleteYomitaiById(id) {
  await sbFetch('yomitai?id=eq.' + id, { method: 'DELETE' });
}
async function updateLikes(id, likes) {
  await sbFetch('yomitai?id=eq.' + id, {
    method: 'PATCH',
    headers: { ...SUPA_HEADERS, 'Prefer': 'return=minimal' },
    body: JSON.stringify({ likes }),
  });
}

// liked はブラウザに残す（個人の操作記録なのでOK）
function getLiked() { return JSON.parse(localStorage.getItem('book-liked') || '[]'); }
function saveLiked(d) { localStorage.setItem('book-liked', JSON.stringify(d)); }

// 古本屋チャットはSupabase版（永続化対応）
async function getChats(bookId) {
  const data = await sbFetch('furubon_chats?furubon_id=eq.' + bookId + '&order=created_at.asc');
  return (data || []).map(c => ({
    id: String(c.id), name: c.name || '匿名', text: c.text,
    createdAt: c.created_at,
  }));
}
async function addChat(bookId, name, text) {
  await sbFetch('furubon_chats', {
    method: 'POST',
    headers: { ...SUPA_HEADERS, 'Prefer': 'return=minimal' },
    body: JSON.stringify({
      furubon_id: Number(bookId), name: name || '匿名', text,
    }),
  });
}

// ─── furubon（古本屋）Supabase版 ─────────────────────
async function getFurubon() {
  const data = await sbFetch('furubon?select=*&order=created_at.asc&done=eq.false');
  return (data || []).map(f => ({
    id: String(f.id), type: f.type, title: f.title,
    author: f.author, poster: f.poster, comment: f.comment,
    image: f.image, done: f.done, createdAt: f.created_at,
  }));
}
async function addFurubon(item) {
  await sbFetch('furubon', {
    method: 'POST',
    headers: { ...SUPA_HEADERS, 'Prefer': 'return=minimal' },
    body: JSON.stringify({
      type: item.type, title: item.title, author: item.author,
      poster: item.poster, comment: item.comment, image: item.image, done: false,
    }),
  });
}
async function doneFurubonById(id) {
  await sbFetch('furubon?id=eq.' + id, {
    method: 'PATCH',
    headers: { ...SUPA_HEADERS, 'Prefer': 'return=minimal' },
    body: JSON.stringify({ done: true }),
  });
}


// ─── INIT ────────────────────────────────────────────
let currentStore = null;
let heroIndex = 0;
let heroTimer = null;

document.addEventListener('DOMContentLoaded', async () => {
  buildHero();
  populateStoreSelect();
  startPoyo();
  await buildFurubonGrid();
  await refreshAll();
});

async function refreshAll() {
  await buildStoreGrid();
  await buildNewsList();
  await buildYomitaiList();
}

// ─── HERO ────────────────────────────────────────────
function buildHero() {
  const slides = document.getElementById('heroSlides');
  const dots   = document.getElementById('heroDots');
  slides.innerHTML = '';
  dots.innerHTML   = '';
  HERO_SLIDES.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'hero-slide';
    div.innerHTML = `
      <img src="${s.img}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="hero-slide-fallback" style="display:none"><div class="hero-slide-fallback-text">本</div></div>
      <div class="hero-caption"><h2>${s.title}</h2><p>${s.sub}</p></div>`;
    slides.appendChild(div);
    const dot = document.createElement('button');
    dot.className = 'hero-dot' + (i===0?' active':'');
    dot.onclick = () => heroGo(i);
    dots.appendChild(dot);
  });
  heroTimer = setInterval(() => heroMove(1), 5000);
}
function heroMove(dir) {
  heroGo((heroIndex + dir + HERO_SLIDES.length) % HERO_SLIDES.length);
}
function heroGo(i) {
  heroIndex = i;
  document.getElementById('heroSlides').style.transform = `translateX(-${i*100}%)`;
  document.querySelectorAll('.hero-dot').forEach((d,j) => d.classList.toggle('active', j===i));
  clearInterval(heroTimer);
  heroTimer = setInterval(() => heroMove(1), 5000);
}

// ─── STORE GRID ──────────────────────────────────────
async function buildStoreGrid() {
  const books = await getBooks();
  const grid = document.getElementById('storeGrid');
  grid.innerHTML = '';
  STORES.forEach(s => {
    const count = books.filter(b => b.storeId === s.id).length;
    const card = document.createElement('div');
    card.className = 'store-card';
    card.onclick = () => openStore(s.id);
    card.innerHTML = `
      <img class="store-card-img" src="${s.img}" alt="${s.name}"
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">

async function submitBook(mode) {
  const prefix  = mode === 'detail' ? 'd-' : 'p-';
  const title   = document.getElementById(prefix+'title').value.trim();
  const storeId = mode === 'detail' ? currentStore?.id : document.getElementById('p-store').value;
  if (!title)   { showToast('書名を入力してください'); return; }
  if (!storeId) { showToast('書店を選んでください'); return; }
  const imgFile = document.getElementById(prefix+'image')?.files[0] || null;
  const image   = await readImageAsBase64(imgFile);
  const pw      = document.getElementById(prefix+'pw')?.value.trim() || '';
  await addBook({
    storeId, title, image, password: pw,
    author:    document.getElementById(prefix+'author').value.trim(),
    publisher: document.getElementById(prefix+'publisher').value.trim(),
    poster:    document.getElementById(prefix+'name').value.trim(),
    point:     document.getElementById(prefix+'point').value.trim(),
    url:       document.getElementById(prefix+'url').value.trim(),
  });
  ['title','author','publisher','name','point','url','pw'].forEach(f => {
    const el = document.getElementById(prefix+f); if (el) el.value = '';
  });
  const imgEl  = document.getElementById(prefix+'image'); if (imgEl) imgEl.value = '';
  const prevEl = document.getElementById(prefix+'image-preview');
  if (prevEl) prevEl.style.display = 'none';
  showToast('📚 投稿しました！');
  if (mode === 'detail') await buildBookGrid(storeId);

  await buildNewsList();
}

function formatDate(iso) {

function showToast(msg) {

async function toggleLike(id, currentLikes) {
  const liked = getLiked();
  const isLiked = liked.includes(id);
  const newLikes = isLiked ? Math.max(0, Number(currentLikes) - 1) : Number(currentLikes) + 1;
  if (isLiked) { saveLiked(liked.filter(l => l !== id)); }
  else         { saveLiked([...liked, id]); }
  await updateLikes(id, newLikes);
  await buildYomitaiList();
}

function readImageAsBase64(file) {
  return new Promise((resolve, reject) => {
    if (!file) { resolve(null); return; }
    if (file.size > 1.5 * 1024 * 1024) {
      showToast('画像は1.5MB以下にしてください'); resolve(null); return;
    }
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
function previewImage(inputId, previewId) {
  const file = document.getElementById(inputId).files[0];
  if (!file) return;
  const label = document.querySelector(`input[id="${inputId}"]`)?.closest('label')?.previousElementSibling;
  const nameId = inputId + '-name';
  let nameEl = document.getElementById(nameId);
  if (!nameEl) {
    nameEl = document.createElement('div');
    nameEl.id = nameId;
    nameEl.style.cssText = 'font-size:12px;color:var(--muted);margin-top:6px;';
    document.getElementById(inputId).closest('label').after(nameEl);
  }
  nameEl.textContent = '📎 ' + file.name;
  const reader = new FileReader();
  reader.onload = e => {
    let el = document.getElementById(previewId);
    if (!el) {
      el = document.createElement('img');
      el.id = previewId;
      el.className = 'img-preview-thumb';
      document.getElementById(inputId).parentNode.appendChild(el);
    }
    el.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

    </div>
    <div class="modal-body">
      <div class="chat-book-info" id="chatBookInfo"></div>
      <div class="chat-messages" id="chatMessages"></div>
    </div>
    <div style="padding:0 20px 16px;flex-shrink:0;">
      <div class="chat-input-row">
        <input type="text" class="form-group input chat-name-input" id="chatName" placeholder="名前（任意）"
          style="font-family:var(--sans);font-size:13px;background:var(--cream);border:1px solid var(--border);border-radius:6px;padding:9px 10px;outline:none;">
        <input type="text" class="chat-msg-input" id="chatMsgInput" placeholder="メッセージを入力..."
          style="font-family:var(--sans);font-size:13px;background:var(--cream);border:1px solid var(--border);border-radius:6px;padding:9px 12px;outline:none;min-width:0;"
          onkeydown="if(event.key==='Enter')sendChat()">
        <button class="chat-send" onclick="sendChat()">送信</button>
      </div>
      <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;">
        <button class="furubon-done" id="chatDoneBtn" onclick="doneFurubonFromChat()">取引完了にする</button>
      </div>
    </div>
  </div>
</div>

<!-- poyo モーダル -->
<div class="modal-overlay" id="poyoModal" onclick="closePoyoModal(event)">
  <div class="modal-box" style="max-width:420px;">
    <div class="modal-header">
      <div style="font-family:var(--serif);font-size:16px;font-weight:700;">今日の気分は？</div>
      <button class="modal-close" onclick="document.getElementById('poyoModal').classList.remove('open')">✕</button>
    </div>
    <div class="modal-body">
      <div class="poyo-modal-balloon" id="poyoModalMsg"></div>
      <div class="mood-grid" id="moodGrid">
        <button class="mood-btn" onclick="pickMood('ぼんやり','😴')">😴<br>ぼんやり</button>
        <button class="mood-btn" onclick="pickMood('熱い','🔥')">🔥<br>熱い</button>
        <button class="mood-btn" onclick="pickMood('しんみり','😢')">😢<br>しんみり</button>
        <button class="mood-btn" onclick="pickMood('笑いたい','😂')">😂<br>笑いたい</button>
        <button class="mood-btn" onclick="pickMood('学びたい','🧠')">🧠<br>学びたい</button>
        <button class="mood-btn" onclick="pickMood('なんでも','✨')">✨<br>なんでも</button>
      </div>
      <div class="poyo-result" id="poyoResult">
        <div class="poyo-result-label" id="poyoResultLabel"></div>
        <div class="poyo-result-book" id="poyoResultBook"></div>
        <button class="poyo-retry" onclick="resetPoyoModal()">もう一度選ぶ</button>
      </div>
    </div>
  </div>
</div>

<!-- poyo キャラ -->
<div class="poyo-wrap" id="poyoWrap">
  <div class="poyo-balloon-wrap" id="poyoBalloon"></div>
  <img src="images/poyo.png" class="poyo-img" alt="poyo" onclick="openPoyoModal()"
    onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
  <div class="poyo-img-fallback" style="display:none" onclick="openPoyoModal()">🐾</div>
</div>


</body>
</html>
